<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>His Love 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ee3a6e, #c4154c, #8a0a30);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .heart {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 2.2em;
            color: #222;
            margin-bottom: 4px;
        }
        .year {
            color: #d4336e;
            font-weight: 300;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        .tagline {
            color: #777;
            font-size: 1.1em;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            transition: transform 0.2s;
        }
        .links a:hover {
            transform: translateY(-2px);
        }
        .links .privacy {
            background: #f0e8f5;
            color: #7b3fa0;
        }
        .links .support {
            background: #fce8ee;
            color: #d4336e;
        }
        .footer {
            margin-top: 32px;
            color: #bbb;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">&hearts;</div>
        <h1>His Love</h1>
        <p class="year">2026</p>
        <p class="tagline">God's promises, delivered daily.<br>Morning, noon, and evening.</p>
        <div class="links">
            <a href="privacy.html" class="privacy">Privacy Policy</a>
            <a href="support.html" class="support">Support</a>
        </div>
        <p class="footer">Available on the App Store</p>
    </div>
</body>
</html>
